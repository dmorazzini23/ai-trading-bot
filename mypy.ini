[mypy]
python_version = 3.12
warn_unused_configs = True
ignore_missing_imports = True
strict_optional = False
disallow_untyped_defs = False
check_untyped_defs = True
warn_return_any = True
warn_unused_ignores = False
no_site_packages = False
mypy_path = typings
exclude = (tools/.*|scripts/.*|sitecustomize\.py)

# This baseline check intentionally avoids broad module-level opt-outs for
# application packages. A narrower strict gate for critical runtime modules is
# enforced via `scripts/typecheck_strict.sh` and `mypy_strict.ini`.
# Global error-code suppressions are intentionally disabled. Any remaining
# exceptions must be scoped to explicit module sections below.

# Localized suppressions migrated from global scope.
[mypy-ai_trading.algorithm_optimizer]
disable_error_code = operator

[mypy-ai_trading.alpaca_api]
disable_error_code = operator

[mypy-ai_trading.analysis.sentiment]
disable_error_code = operator,index

[mypy-ai_trading.broker.adapters]
