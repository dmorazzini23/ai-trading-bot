[mypy]
python_version = 3.12
warn_unused_configs = True
ignore_missing_imports = True
strict_optional = False
disallow_untyped_defs = True
check_untyped_defs = True
warn_return_any = True
warn_unused_ignores = True
no_site_packages = False
mypy_path = typings
exclude = (ai_trading/portfolio/__init__\.py|tools/.*|scripts/.*|sitecustomize\.py)

[mypy-tests.*]
disallow_untyped_defs = False
ignore_errors = True

[mypy-ai_trading.*]
disallow_untyped_defs = False
ignore_errors = True

[mypy-ai_trading.__init__]
ignore_errors = False
disallow_untyped_defs = True

[mypy-ai_trading.main]
ignore_errors = True
disallow_untyped_defs = False

[mypy-ai_trading.alpaca_api]
ignore_errors = True
disallow_untyped_defs = False

[mypy-ai_trading.core.alpaca_client]
ignore_errors = True
disallow_untyped_defs = False

[mypy-ai_trading.health]
ignore_errors = False
disallow_untyped_defs = False

[mypy-ai_trading.data.fetch_yf]
ignore_errors = False
disallow_untyped_defs = False

[mypy-sitecustomize]
ignore_errors = True
