[mypy]
python_version = 3.12
warn_unused_configs = True
ignore_missing_imports = True
strict_optional = False
disallow_untyped_defs = False
check_untyped_defs = True
warn_return_any = True
warn_unused_ignores = False
no_site_packages = False
mypy_path = typings
exclude = (tools/.*|scripts/.*|sitecustomize\.py)

# This baseline check intentionally avoids broad module-level opt-outs for
# application packages. A narrower strict gate for critical runtime modules is
# enforced via `scripts/typecheck_strict.sh` and `mypy_strict.ini`.
disable_error_code = attr-defined,arg-type,assignment,var-annotated,operator,union-attr,misc,valid-type,no-redef,name-defined,no-any-return,index,method-assign,return-value,func-returns-value,call-arg,import-untyped,dict-item,call-overload,override

[mypy-tests.*]
disallow_untyped_defs = False
