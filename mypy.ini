[mypy]
python_version = 3.12
warn_unused_configs = True
ignore_missing_imports = True
strict_optional = False
disallow_untyped_defs = False
check_untyped_defs = True
warn_return_any = True
warn_unused_ignores = False
no_site_packages = False
mypy_path = typings
exclude = (tools/.*|scripts/.*|sitecustomize\.py)

# This baseline check intentionally avoids broad module-level opt-outs for
# application packages. A narrower strict gate for critical runtime modules is
# enforced via `scripts/typecheck_strict.sh` and `mypy_strict.ini`.
# Remaining global suppressions are limited to high-volume debt families still
# spread across runtime modules (not just tests).
# - attr-defined,arg-type,assignment: dynamic object contracts in legacy runtime paths
# - var-annotated,no-redef,valid-type,name-defined,misc: optional-import and alias-heavy modules
# - operator,index: vector/math utilities with mixed scalar/container types
# - no-any-return,return-value: adapters still returning dynamic payloads
# - import-untyped: third-party libs without local type stubs (e.g. requests stack)
disable_error_code = attr-defined,arg-type,assignment,var-annotated,operator,misc,valid-type,no-redef,name-defined,no-any-return,index,return-value,import-untyped

[mypy-tests.*]
disallow_untyped_defs = False
# Tests rely heavily on monkeypatching and dynamic fixtures; keep call-site
# strictness practical while runtime packages tighten.
disable_error_code = call-arg,call-overload

[mypy-ai_trading.settings]
# Pydantic `Field(...)` alias patterns and generated Settings initializer still
# trigger `call-arg`/`call-overload` false positives; track locally, not global.
disable_error_code = call-arg,call-overload

[mypy-ai_trading.config]
disallow_untyped_defs = True
warn_unused_ignores = True

[mypy-ai_trading.config.alpaca]
disallow_untyped_defs = True
warn_unused_ignores = True

[mypy-ai_trading.config.management]
disallow_untyped_defs = True
warn_unused_ignores = True

[mypy-ai_trading.config.runtime]
disallow_untyped_defs = True
warn_unused_ignores = True

[mypy-ai_trading.config.settings]
disallow_untyped_defs = True
warn_unused_ignores = True

[mypy-ai_trading.validation.require_env]
disallow_untyped_defs = True
warn_unused_ignores = True

[mypy-ai_trading.validation.validate_env]
disallow_untyped_defs = True
warn_unused_ignores = True
