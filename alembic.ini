[alembic]
script_location = migrations
prepend_sys_path = .
timezone = UTC

# Default is only used when DATABASE_URL/AI_TRADING_OMS_INTENT_STORE_PATH are absent.
sqlalchemy.url = sqlite:///runtime/oms_intents.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
