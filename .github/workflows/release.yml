name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.2.3)"
        required: true
        type: string
      target:
        description: "Branch or commit to release from"
        required: true
        default: "main"
        type: string
      prerelease:
        description: "Mark release as prerelease"
        required: true
        default: false
        type: boolean
      draft:
        description: "Create release as draft"
        required: true
        default: true
        type: boolean

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read
  checks: read

jobs:
  pre-release-gates:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: read
      checks: read
    outputs:
      release_sha: ${{ steps.resolve-target.outputs.sha }}
    env:
      RELEASE_TARGET: ${{ inputs.target }}
      INSTITUTIONAL_STRICT: "1"
      INSTITUTIONAL_SKIP_PYTEST: "0"
      INSTITUTIONAL_FAIL_ON_SKIP: "1"
      AI_TRADING_INSTITUTIONAL_REQUIRE_PHASE2_GATE: "0"
      AI_TRADING_PROMOTION_REQUIRE_APPROVAL: "0"
    steps:
      - name: Resolve release target
        id: resolve-target
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const {owner, repo} = context.repo;
            const target = process.env.RELEASE_TARGET.trim();
            const {data} = await github.rest.repos.getCommit({owner, repo, ref: target});
            core.setOutput("sha", data.sha);

      - name: Verify target SHA has passing CI
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const {owner, repo} = context.repo;
            const head_sha = "${{ steps.resolve-target.outputs.sha }}";
            const required = ["ci.yml", "codeql.yml", "dependency-audit.yml"];
            const missing = [];
            const failing = [];
            for (const workflow_id of required) {
              const {data} = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id,
                head_sha,
                per_page: 1,
              });
              const run = data.workflow_runs[0];
              if (!run) {
                missing.push(workflow_id);
              } else if (run.conclusion !== "success") {
                failing.push(`${workflow_id}:${run.conclusion || run.status}`);
              }
            }
            if (missing.length || failing.length) {
              core.setFailed(`Release target ${head_sha} lacks passing required workflows; missing=${missing.join(",")}; failing=${failing.join(",")}`);
            }

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ steps.resolve-target.outputs.sha }}
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt
            requirements/*.txt

      - name: Install release gate dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints.txt -r requirements.txt -r requirements-dev.txt -r requirements-test.txt
          pip install -e . --no-deps

      - name: Verify release target gates
        run: |
          git ls-files -z '*.py' | xargs -0 python -m py_compile
          ruff check .
          bash scripts/typecheck_strict.sh
          make secret-scan
          bash tools/ci/guard_shims.sh
          make institutional-gates

  build-and-release:
    needs: pre-release-gates
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      contents: write
      actions: read
      checks: read
    env:
      RELEASE_TAG: ${{ inputs.tag }}
      RELEASE_SHA: ${{ needs.pre-release-gates.outputs.release_sha }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ env.RELEASE_SHA }}
          fetch-depth: 0

      - name: Validate release tag
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$ ]]; then
            echo "ERROR: tag must look like vX.Y.Z (optional prerelease/build suffix allowed)."
            exit 1
          fi

      - name: Ensure tag does not already exist
        run: |
          if git ls-remote --tags origin "refs/tags/${RELEASE_TAG}" | grep -q .; then
            echo "ERROR: tag ${RELEASE_TAG} already exists on origin."
            exit 1
          fi

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt
            requirements/*.txt

      - name: Build distribution artifacts
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints.txt build twine
          python - <<'PY'
          from __future__ import annotations

          import os
          import re
          from pathlib import Path

          from packaging.version import Version

          raw_tag = os.environ["RELEASE_TAG"].strip()
          version = raw_tag[1:] if raw_tag.startswith("v") else raw_tag
          Version(version)
          pyproject = Path("pyproject.toml")
          text = pyproject.read_text(encoding="utf-8")
          updated = re.sub(
              r'(?m)^version = "0\.0\.0"$',
              f'version = "{version}"',
              text,
              count=1,
          )
          if updated == text:
              raise SystemExit("pyproject.toml did not contain the expected placeholder version")
          pyproject.write_text(updated, encoding="utf-8")
          PY
          python -m build
          python -m twine check dist/*

      - name: Generate checksums
        run: |
          sha256sum dist/* > dist/SHA256SUMS

      - name: Upload release artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: release-${{ env.RELEASE_TAG }}
          path: dist/*

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_DRAFT: ${{ inputs.draft }}
          RELEASE_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          args=(--target "${RELEASE_SHA}" --title "${RELEASE_TAG}" --generate-notes)
          if [[ "${RELEASE_DRAFT}" == "true" ]]; then
            args+=(--draft)
          fi
          if [[ "${RELEASE_PRERELEASE}" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh release create "${RELEASE_TAG}" dist/* "${args[@]}"
