name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.2.3)"
        required: true
        type: string
      target:
        description: "Branch or commit to release from"
        required: true
        default: "main"
        type: string
      prerelease:
        description: "Mark release as prerelease"
        required: true
        default: false
        type: boolean
      draft:
        description: "Create release as draft"
        required: true
        default: true
        type: boolean

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    environment: release
    env:
      RELEASE_TAG: ${{ inputs.tag }}
      RELEASE_TARGET: ${{ inputs.target }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TARGET }}
          fetch-depth: 0

      - name: Validate release tag
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$ ]]; then
            echo "ERROR: tag must look like vX.Y.Z (optional prerelease/build suffix allowed)."
            exit 1
          fi

      - name: Ensure tag does not already exist
        run: |
          if git ls-remote --tags origin "refs/tags/${RELEASE_TAG}" | grep -q .; then
            echo "ERROR: tag ${RELEASE_TAG} already exists on origin."
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt
            requirements/*.txt

      - name: Build distribution artifacts
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Generate checksums
        run: |
          sha256sum dist/* > dist/SHA256SUMS

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ env.RELEASE_TAG }}
          path: dist/*

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ env.RELEASE_TARGET }}
          name: ${{ env.RELEASE_TAG }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            dist/*
