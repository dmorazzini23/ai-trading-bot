name: Dependency Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "35 09 * * 1"
  push:
    branches: ["main", "master"]
    paths:
      - "requirements*.txt"
      - "requirements/**"
      - "pyproject.toml"
      - ".github/workflows/dependency-audit.yml"
  pull_request:
    paths:
      - "requirements*.txt"
      - "requirements/**"
      - "pyproject.toml"
      - ".github/workflows/dependency-audit.yml"

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements*.txt
            requirements/*.txt
            constraints.txt
      - name: Install audit tool
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
      - name: Audit dependencies
        run: |
          python -m pip install -c constraints.txt -r requirements.txt
          AUDIT_IGNORES=(
            # torch is pinned for runtime compatibility; reassess with the next
            # ML stack upgrade instead of forcing a major runtime jump here.
            --ignore-vuln PYSEC-2025-41
            --ignore-vuln PYSEC-2024-259
            --ignore-vuln CVE-2025-2953
            --ignore-vuln CVE-2025-3730
            # transformers 5.x is a major upgrade; keep FinBERT optional paths
            # on the current pin until the NLP stack is validated.
            --ignore-vuln CVE-2026-1839
          )
          pip-audit --local "${AUDIT_IGNORES[@]}" --format json --output pip-audit-report.json
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          if-no-files-found: error
