name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "20 09 * * 1-5"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-22.04
    env:
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
      AI_TRADING_OFFLINE_TESTS: "1"
      ALPACA_API_KEY: "test"
      ALPACA_SECRET_KEY: "test"
      # If your code looks at this to choose paper/live, force paper/offline
      ALPACA_ENV: "paper"
      # Ratcheting floor: bump by +2-3 points per sprint toward 95%+.
      COVERAGE_MIN: "80"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt
            requirements/*.txt
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Verify institutional test dependencies
        run: |
          python - <<'PY'
          import importlib

          required_modules = ("sqlalchemy", "psycopg", "pytest_asyncio")
          missing = []
          for module_name in required_modules:
              try:
                  importlib.import_module(module_name)
              except Exception:
                  missing.append(module_name)

          if missing:
              raise SystemExit(
                  "Missing required dependencies for institutional tests: "
                  + ", ".join(missing)
              )
          print("INSTITUTIONAL_TEST_DEPENDENCIES_OK")
          PY
      - name: Secret exposure guard
        run: make secret-scan
      - name: Institutional gates (strict bundle)
        run: INSTITUTIONAL_STRICT=1 INSTITUTIONAL_SKIP_PYTEST=0 INSTITUTIONAL_FAIL_ON_SKIP=1 make institutional-gates
      - name: Compile
        run: python -m compileall . -q
      - name: Lint + Format + Types
        run: |
          ruff --version
          ruff check .
          ruff format --check .
          mypy ai_trading tests
      - name: Audit exceptions
        run: make audit-exceptions
      - name: Legacy scan
        run: make legacy-scan
      - name: Dead code scan
        run: vulture ai_trading scripts run.py --min-confidence 80
      - name: Tests
        run: |
          pytest -q -n auto --maxfail=1 \
            --cov=ai_trading \
            --cov-report=term-missing \
            --cov-fail-under="${COVERAGE_MIN}"

  determinism-seed-matrix:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        seed: [1, 42, 1337]
    env:
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
      AI_TRADING_OFFLINE_TESTS: "1"
      ALPACA_API_KEY: "test"
      ALPACA_SECRET_KEY: "test"
      ALPACA_ENV: "paper"
      SEED: "${{ matrix.seed }}"
      AI_TRADING_SEED: "${{ matrix.seed }}"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt
            requirements/*.txt
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Deterministic replay checks
        run: |
          pytest -q \
            tests/integration/test_replay_seed_matrix_env.py \
            tests/integration/test_replay_async_order_events.py \
            tests/integration/test_parity_invariants.py \
            tests/unit/test_simulated_broker_reproducible.py \
            tests/unit/test_no_unseeded_global_random_simulator_usage.py

  nightly-full-deps:
    if: github.event_name == 'schedule'
    continue-on-error: true
    runs-on: ubuntu-22.04
    env:
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
      AI_TRADING_OFFLINE_TESTS: "1"
      ALPACA_API_KEY: "test"
      ALPACA_SECRET_KEY: "test"
      ALPACA_ENV: "paper"
      COVERAGE_MIN: "80"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt
            requirements/*.txt
      - name: Install full test deps bundle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt -r requirements-test.txt
      - name: Nightly full-deps tests with coverage
        run: |
          pytest -q --maxfail=1 \
            --cov=ai_trading \
            --cov-report=term-missing \
            --cov-fail-under="${COVERAGE_MIN}"
