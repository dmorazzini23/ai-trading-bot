name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "20 09 * * 1-5"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  AI_TRADING_DATA_DIR: ${{ github.workspace }}/.ci/data
  AI_TRADING_CACHE_DIR: ${{ github.workspace }}/.ci/cache
  AI_TRADING_LOG_DIR: ${{ github.workspace }}/.ci/logs
  AI_TRADING_MODELS_DIR: ${{ github.workspace }}/.ci/models
  AI_TRADING_OUTPUT_DIR: ${{ github.workspace }}/.ci/output
  YF_CACHE_DIR: ${{ github.workspace }}/.ci/cache/yf

jobs:
  research-backtest-gate:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    env:
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
      AI_TRADING_OFFLINE_TESTS: "1"
      ALPACA_API_KEY: "test"
      ALPACA_SECRET_KEY: "test"
      ALPACA_ENV: "paper"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt
            requirements/*.txt
      - name: Install deps
        run: |
          python3 -m pip install --upgrade pip
          pip install -c constraints.txt -r requirements-dev.txt
      - name: Research backtest gate
        run: |
          pytest -q \
            tests/test_backtest_smoke.py \
            tests/test_backtester_artifacts.py \
            tests/test_historical_bars.py \
            tests/test_historical_regression_fixtures.py \
            tests/test_backtest_script_compat.py \
            tests/unit/test_backtester_oms_events.py \
            tests/unit/test_backtest_replay_determinism.py

  offline-replay-gate:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    env:
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
      AI_TRADING_OFFLINE_TESTS: "1"
      ALPACA_API_KEY: "test"
      ALPACA_SECRET_KEY: "test"
      ALPACA_ENV: "paper"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt
            requirements/*.txt
      - name: Install deps
        run: |
          python3 -m pip install --upgrade pip
          pip install -c constraints.txt -r requirements-dev.txt
      - name: Offline replay gate
        run: |
          pytest -q \
            tests/test_offline_replay.py \
            tests/test_historical_bars.py \
            tests/test_historical_regression_fixtures.py \
            tests/test_replay_engine_deterministic.py \
            tests/integration/test_replay_seed_matrix_env.py \
            tests/integration/test_replay_async_order_events.py \
            tests/integration/test_parity_invariants.py \
            tests/test_replay_governance_async_parity.py

  ci:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    env:
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
      AI_TRADING_OFFLINE_TESTS: "1"
      ALPACA_API_KEY: "test"
      ALPACA_SECRET_KEY: "test"
      # If your code looks at this to choose paper/live, force paper/offline
      ALPACA_ENV: "paper"
      # Ratcheting floor: bump by +2-3 points per sprint toward 95%+.
      COVERAGE_MIN: "80"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt
            requirements/*.txt
      - name: Install deps
        run: |
          python3 -m pip install --upgrade pip
          pip install -c constraints.txt -r requirements-dev.txt
      - name: Alembic migration gate
        env:
          OMS_CI_DB_PATH: ${{ github.workspace }}/.ci/oms_migration_gate.db
          DATABASE_URL: sqlite:///${{ github.workspace }}/.ci/oms_migration_gate.db
          AI_TRADING_OMS_INTENT_STORE_PATH: ${{ github.workspace }}/.ci/oms_migration_gate.db
        run: |
          mkdir -p "${{ github.workspace }}/.ci"
          python3 -m alembic -c alembic.ini upgrade head
          python3 - <<'PY'
          import sqlite3
          from pathlib import Path
          import os

          db_path = Path(os.environ["OMS_CI_DB_PATH"])
          with sqlite3.connect(db_path) as conn:
              row = conn.execute("SELECT version_num FROM alembic_version LIMIT 1").fetchone()

          if row is None or str(row[0]) != "20260414_0001":
              raise SystemExit(f"Alembic head mismatch: got {row!r}")
          print("ALEMBIC_HEAD_OK")
          PY
      - name: OMS invariants gate
        env:
          DATABASE_URL: sqlite:///${{ github.workspace }}/.ci/oms_migration_gate.db
          AI_TRADING_OMS_INTENT_STORE_PATH: ${{ github.workspace }}/.ci/oms_migration_gate.db
        run: |
          python3 - <<'PY'
          from ai_trading.oms.invariants import evaluate_oms_reconciliation_invariants

          summary = evaluate_oms_reconciliation_invariants(limit=500)
          if not bool(summary.get("available", False)):
              raise SystemExit(f"OMS invariant summary unavailable: {summary}")
          if not bool(summary.get("ok", False)):
              raise SystemExit(f"OMS invariant summary failed: {summary}")
          print("OMS_INVARIANTS_OK")
          PY
      - name: Verify institutional test dependencies
        run: |
          python3 - <<'PY'
          import importlib

          required_modules = ("sqlalchemy", "psycopg", "pytest_asyncio")
          missing = []
          for module_name in required_modules:
              try:
                  importlib.import_module(module_name)
              except Exception:
                  missing.append(module_name)

          if missing:
              raise SystemExit(
                  "Missing required dependencies for institutional tests: "
                  + ", ".join(missing)
              )
          print("INSTITUTIONAL_TEST_DEPENDENCIES_OK")
          PY
      - name: Secret exposure guard
        run: make secret-scan
      - name: Shim guard
        run: bash tools/ci/guard_shims.sh
      - name: Institutional gates (strict bundle)
        run: INSTITUTIONAL_STRICT=1 INSTITUTIONAL_SKIP_PYTEST=0 INSTITUTIONAL_FAIL_ON_SKIP=1 make institutional-gates
      - name: Compile
        run: python3 -m py_compile $(git ls-files '*.py')
      - name: Lint + Format + Types
        run: |
          ruff --version
          ruff check .
          ruff format --check .
          bash scripts/typecheck_strict.sh
      - name: Runtime env guard
        run: python3 tools/ci/guard_runtime_env_access.py
      - name: Audit exceptions
        run: make audit-exceptions
      - name: Legacy scan
        run: make legacy-scan
      - name: Dead code scan
        run: vulture ai_trading scripts run.py --min-confidence 80
      - name: Tests
        run: |
          pytest -q -n auto --maxfail=1 \
            --cov=ai_trading \
            --cov-report=term-missing \
            --cov-fail-under="${COVERAGE_MIN}"
      - name: Runtime performance report
        if: always()
        run: |
          mkdir -p "${AI_TRADING_OUTPUT_DIR}"
          python3 -m ai_trading.tools.runtime_performance_report --json \
            > "${AI_TRADING_OUTPUT_DIR}/runtime_performance_report.json"
      - name: Upload runtime performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-performance-report
          path: ${{ env.AI_TRADING_OUTPUT_DIR }}/runtime_performance_report.json
          if-no-files-found: error

  determinism-seed-matrix:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        seed: [1, 42, 1337]
    env:
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
      AI_TRADING_OFFLINE_TESTS: "1"
      ALPACA_API_KEY: "test"
      ALPACA_SECRET_KEY: "test"
      ALPACA_ENV: "paper"
      SEED: "${{ matrix.seed }}"
      AI_TRADING_SEED: "${{ matrix.seed }}"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt
            requirements/*.txt
      - name: Install deps
        run: |
          python3 -m pip install --upgrade pip
          pip install -c constraints.txt -r requirements-dev.txt
      - name: Deterministic replay checks
        run: |
          pytest -q \
            tests/integration/test_replay_seed_matrix_env.py \
            tests/integration/test_replay_async_order_events.py \
            tests/integration/test_parity_invariants.py \
            tests/unit/test_simulated_broker_reproducible.py \
            tests/unit/test_no_unseeded_global_random_simulator_usage.py

  nightly-full-deps:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-24.04
    env:
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
      AI_TRADING_OFFLINE_TESTS: "1"
      ALPACA_API_KEY: "test"
      ALPACA_SECRET_KEY: "test"
      ALPACA_ENV: "paper"
      COVERAGE_MIN: "80"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt
            requirements/*.txt
      - name: Install full test deps bundle
        run: |
          python3 -m pip install --upgrade pip
          pip install -c constraints.txt -r requirements-dev.txt -r requirements-test.txt
      - name: Nightly full-deps tests with coverage
        run: |
          pytest -q --maxfail=1 \
            --cov=ai_trading \
            --cov-report=term-missing \
            --cov-fail-under="${COVERAGE_MIN}"
      - name: Runtime performance report
        if: always()
        run: |
          mkdir -p "${AI_TRADING_OUTPUT_DIR}"
          python3 -m ai_trading.tools.runtime_performance_report --json \
            > "${AI_TRADING_OUTPUT_DIR}/runtime_performance_report.json"
      - name: Upload runtime performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-performance-report-nightly
          path: ${{ env.AI_TRADING_OUTPUT_DIR }}/runtime_performance_report.json
          if-no-files-found: error
