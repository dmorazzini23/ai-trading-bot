name: Workflow Lint

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
  pull_request:

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Install actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@latest
      - name: Lint workflows
        run: |
          ~/go/bin/actionlint -color
